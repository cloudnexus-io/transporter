# Default values for transporter.

# The controller deployment configuration 
controller:
  enabled: true
  replicaCount: 1
  
  image:
    repository: 192.168.1.20:5000/controller
    tag: latest
    pullPolicy: Always
    
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Migration agent configuration  
migrationAgent:
  enabled: true
  image:
    repository: 192.168.1.20:5000/migration-agent
    tag: latest
    pullPolicy: Always
    
# Service account configuration
serviceAccount:
  create: true
  name: ""
    
# General settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}

tolerations: []

affinity: {}
