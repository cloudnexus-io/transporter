# Default values for transporter.

# The controller deployment configuration 
controller:
  enabled: true
  replicaCount: 1
  
  image:
    repository: 192.168.1.20:5000/controller
    tag: latest
    pullPolicy: Always

  env:
    # TRANSPORTER_SIDECAR_IMAGE: "my-registry.com/transporter-proxy:latest"

  ports:
    - containerPort: 8081
      name: healthz
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  livenessProbe:
    httpGet:
      path: /healthz
      port: healthz
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /readyz
      port: healthz
    initialDelaySeconds: 5
    periodSeconds: 10

# Migration agent configuration  
migrationAgent:
  enabled: true
  image:
    repository: 192.168.1.20:5000/migration-agent
    tag: latest
    pullPolicy: Always

  env:
    - name: AGENT_PORT
      value: "50051"
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  ports:
    - name: grpc
      containerPort: 50051
      hostPort: 50051

# Sidecar configuration
sidecar:
  # Configure the sidecar image used during migration
  # If not set, defaults to "transporter-proxy:latest"
  image: "192.168.1.20:5000/transporter-proxy:latest"
    
# Service account configuration
serviceAccount:
  create: true
  name: ""
    
# General settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}

tolerations: []

affinity: {}
