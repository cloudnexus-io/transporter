apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: podmigrations.migration.transporter.io
spec:
  group: migration.transporter.io
  names:
    kind: PodMigration
    listKind: PodMigrationList
    plural: podmigrations
    singular: podmigration
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              podName:
                type: string
              namespace:
                type: string
              sourceNode:
                type: string
              targetNode:
                type: string
              strategy:
                type: string
          status:
            type: object
            properties:
              migrationID:
                type: string
              phase:
                type: string
              startTime:
                type: string
                format: date-time
              message:
                type: string
