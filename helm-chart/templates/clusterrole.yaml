apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "transporter.fullname" . }}
rules:
- apiGroups:
  - migration.transporter.io
  resources:
  - podmigrations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - migration.transporter.io
  resources:
  - podmigrations/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  - pods/exec
  - events
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
  - delete
